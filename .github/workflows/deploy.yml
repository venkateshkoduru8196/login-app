name: Deploy Project

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # React build
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Build React
      run: |
        cd "deploy basic/login"
        npm install
        npm run build

    # FTP Deploy
    - name: Deploy to FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: deploy basic/login/dist/
        server-dir: ${{ secrets.FTP_DIR }}
